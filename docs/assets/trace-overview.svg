    <text x="86" y="156" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#1f8f67">Premium Support</text>
    <text x="708" y="156" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#1f8f67">+$200</text>
    <text x="86" y="182" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#486177">Attribute-driven uplift for support level = Premium.</text>

    <text x="86" y="196" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#e36f3d">Legacy Bundle Incentive</text>
    <text x="708" y="196" font-size="20" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#e36f3d">-$50</text>
    <text x="86" y="222" font-size="16" font-family="Segoe UI, Arial, sans-serif" fill="#486177">Bundle incentive partially offsets the new uplift.</text>
