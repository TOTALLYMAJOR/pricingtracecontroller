    <text x="34" y="122" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#486177">
      Old MRR $2,500 to New MRR $2,950 driven by usage tier crossover, premium support, and discount retirement.
    </text>

    <rect x="1088" y="26" width="130" height="40" rx="20" fill="#10233c"/>
