    <text x="332" y="118" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#486177">Rate</text>
    <text x="448" y="118" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#486177">Applied Qty</text>
    <text x="592" y="118" font-size="16" font-weight="700" font-family="Segoe UI, Arial, sans-serif" fill="#486177">Applied Value</text>

    <rect x="28" y="144" width="664" height="46" rx="14" fill="#ffffff" stroke="#dde4ea"/>
    <text x="44" y="173" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#10233c">Tier 1</text>
    <text x="198" y="173" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#10233c">1 - 100</text>
    <text x="332" y="173" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#10233c">$25</text>
    <text x="470" y="173" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#10233c">100</text>
    <text x="602" y="173" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#10233c">$2,500</text>
